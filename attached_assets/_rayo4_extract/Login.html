<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAYO — Login Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail" data-bg-color="#0C3B2E">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0C3B2E"/>
    <circle cx="600" cy="400" r="120" fill="#C8553D"/>
    <g stroke="#E8C77E" stroke-width="6" stroke-linecap="round">
      <line x1="600" y1="200" x2="600" y2="240"/>
      <line x1="600" y1="560" x2="600" y2="600"/>
      <line x1="400" y1="400" x2="440" y2="400"/>
      <line x1="760" y1="400" x2="800" y2="400"/>
    </g>
    <text x="600" y="700" text-anchor="middle" fill="#FAF4E8" font-family="sans-serif" font-size="64" font-weight="700" letter-spacing="-2">RAYO</text>
  </svg>
</template>
<style>
  :root {
    --sand-50:#FAF4E8; --sand-100:#F2E9D5; --sand-200:#E8DBBF; --sand-300:#D9C89E; --sand-400:#BFA87A;
    --forest-900:#0C3B2E; --forest-700:#144D3C; --forest-500:#1E6A52;
    --sage-100:#DCE8D2; --sage-300:#A9C396; --sage-500:#6D9773; --sage-700:#4F7253;
    --terra-100:#F2D6CC; --terra-300:#E08770; --terra-500:#C8553D; --terra-700:#9C3A26;
    --ochre-300:#E8C77E; --ochre-500:#D4A24C; --ochre-700:#A37A2D;
    --ink-900:#0E1A14; --ink-700:#1F2A22; --ink-500:#4A5247; --ink-400:#6E7569; --ink-300:#9CA098;
    --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-pill:999px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:#1a1a1a;color:var(--ink-900);
    font-family:'Outfit',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  .mono{font-family:ui-monospace,'SF Mono',monospace;}

  /* ─── Stage: two phones side-by-side on a dark backdrop ─── */
  .stage{
    min-height:100vh;
    background:
      radial-gradient(circle at 30% 20%, rgba(200,85,61,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(108,151,115,0.06) 0%, transparent 50%),
      #0E1A14;
    padding:60px 24px;
    display:flex;align-items:center;justify-content:center;gap:64px;
    flex-wrap:wrap;
  }
  .stage-label{
    position:absolute;top:24px;left:32px;
    font-family:ui-monospace,monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(232,199,126,0.7);font-weight:600;
  }
  .frame-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;}
  .frame-cap{
    font-family:ui-monospace,monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(250,244,232,0.55);font-weight:600;
  }

  /* ─── iPhone frame ─── */
  .iphone{
    width:390px;height:844px;
    background:#000;border-radius:54px;
    padding:14px;
    box-shadow:0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    position:relative;
  }
  .iphone-screen{
    width:100%;height:100%;border-radius:42px;overflow:hidden;
    background:var(--sand-50);position:relative;
  }
  .iphone-notch{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:120px;height:32px;background:#000;border-radius:18px;
    z-index:20;
  }
  .status-bar{
    position:absolute;top:0;left:0;right:0;height:54px;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 32px 0;
    font-size:15px;font-weight:600;color:var(--ink-900);
    z-index:15;
    pointer-events:none;
  }
  .status-bar.light{color:var(--sand-50);}
  .status-bar .icons{display:flex;align-items:center;gap:6px;}
  .home-indicator{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;background:var(--ink-900);border-radius:3px;opacity:0.4;
    z-index:25;
  }
  .iphone-screen.dark + .status-bar .home-indicator,
  .home-indicator.light{background:var(--sand-50);}

  /* ════════════════════════════════════════════════════════════
     SCREEN 1 — WELCOME (full bleed photo + bottom CTA)
     ════════════════════════════════════════════════════════════ */
  .welcome{
    position:relative;width:100%;height:100%;
    display:flex;flex-direction:column;
    color:var(--sand-50);
    overflow:hidden;
  }
  /* Forest "photo" background — placeholder layered gradients */
  .welcome-bg{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 70% 60% at 30% 25%, rgba(232,199,126,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(200,85,61,0.18) 0%, transparent 60%),
      linear-gradient(180deg, #1a4438 0%, #0C3B2E 35%, #082921 70%, #051a14 100%);
  }
  /* Foliage layer — abstract leaf shapes via radial gradients */
  .welcome-bg::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(ellipse 240px 320px at 15% 18%, rgba(143,182,149,0.18) 0%, transparent 50%),
      radial-gradient(ellipse 280px 200px at 85% 12%, rgba(108,151,115,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 200px 280px at 75% 45%, rgba(143,182,149,0.14) 0%, transparent 55%),
      radial-gradient(ellipse 320px 240px at 25% 60%, rgba(78,114,83,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 220px 180px at 95% 75%, rgba(108,151,115,0.18) 0%, transparent 55%);
  }
  /* Subtle film grain */
  .welcome-bg::after{
    content:"";position:absolute;inset:0;opacity:0.5;
    background-image:repeating-linear-gradient(135deg,transparent 0,transparent 14px,rgba(255,255,255,0.022) 14px,rgba(255,255,255,0.022) 15px);
  }
  /* Scrim — darkens lower half so text reads */
  .welcome-scrim{
    position:absolute;left:0;right:0;bottom:0;height:65%;
    background:linear-gradient(180deg, transparent 0%, rgba(8,28,22,0.35) 30%, rgba(8,28,22,0.85) 75%, #051a14 100%);
  }

  .welcome-top{
    position:relative;z-index:5;padding:64px 32px 0;
    display:flex;align-items:center;gap:12px;
  }
  .brand-mark{
    width:42px;height:42px;border-radius:12px;
    background:var(--terra-500);display:grid;place-items:center;flex-shrink:0;
    box-shadow:0 4px 14px rgba(0,0,0,0.3);
  }
  .brand-name{font-size:20px;font-weight:700;letter-spacing:-0.04em;color:var(--sand-50);line-height:1;}

  .welcome-mid{flex:1;}

  .welcome-bot{
    position:relative;z-index:5;padding:0 32px 48px;
    display:flex;flex-direction:column;gap:24px;
  }
  .welcome-eyebrow{
    font-family:ui-monospace,monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--ochre-300);font-weight:600;
    display:inline-flex;align-items:center;gap:10px;
  }
  .welcome-eyebrow::before{content:"";width:24px;height:1px;background:var(--ochre-300);}
  .welcome-title{
    font-size:48px;font-weight:600;letter-spacing:-0.04em;line-height:0.95;
    color:var(--sand-50);
  }
  .welcome-title .light{font-weight:200;color:var(--terra-300);font-style:italic;}
  .welcome-title .ochre{color:var(--ochre-300);font-weight:200;}
  .welcome-sub{
    font-size:15px;line-height:1.5;color:var(--sand-200);
    max-width:32ch;
  }
  .welcome-cta{
    background:var(--sand-50);color:var(--forest-900);
    border:none;border-radius:var(--r-pill);
    padding:18px;font-family:inherit;font-size:15px;font-weight:600;
    width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:8px;
    transition:all .2s;
  }
  .welcome-cta:hover{background:var(--terra-500);color:var(--sand-50);}
  .welcome-link{
    text-align:center;font-size:14px;color:var(--sand-200);
    text-decoration:none;
  }
  .welcome-link strong{color:var(--ochre-300);font-weight:600;border-bottom:1px solid var(--ochre-300);padding-bottom:1px;}

  /* ════════════════════════════════════════════════════════════
     SCREEN 2 — SIGN IN (photo top + white wave + form)
     ════════════════════════════════════════════════════════════ */
  .signin{
    position:relative;width:100%;height:100%;
    display:flex;flex-direction:column;
    background:var(--sand-50);
    overflow:hidden;
  }
  .signin-photo{
    position:absolute;left:0;right:0;top:0;height:300px;
    background:
      radial-gradient(ellipse 70% 60% at 30% 25%, rgba(232,199,126,0.2) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(200,85,61,0.2) 0%, transparent 60%),
      linear-gradient(180deg, #1a4438 0%, #0C3B2E 60%, #082921 100%);
    overflow:hidden;
  }
  .signin-photo::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(ellipse 200px 260px at 18% 30%, rgba(143,182,149,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 260px 200px at 85% 20%, rgba(108,151,115,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 240px 180px at 60% 80%, rgba(78,114,83,0.3) 0%, transparent 55%);
  }
  .signin-photo::after{
    content:"";position:absolute;inset:0;opacity:0.5;
    background-image:repeating-linear-gradient(135deg,transparent 0,transparent 14px,rgba(255,255,255,0.022) 14px,rgba(255,255,255,0.022) 15px);
  }
  /* SVG wave that joins photo to form area */
  .signin-wave{
    position:absolute;left:0;right:0;top:240px;width:100%;height:80px;
    z-index:2;
  }
  .signin-back{
    position:absolute;top:64px;left:24px;z-index:5;
    width:40px;height:40px;border-radius:50%;
    background:rgba(250,244,232,0.92);
    border:none;display:grid;place-items:center;
    color:var(--forest-900);cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }

  /* Sprig — small leaf accent decorating the title */
  .sprig{
    width:54px;height:54px;flex-shrink:0;
  }

  .signin-form{
    position:relative;z-index:3;
    margin-top:300px;
    padding:28px 32px 32px;
    background:var(--sand-50);
    flex:1;
    display:flex;flex-direction:column;
  }
  .signin-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;}
  .signin-title{
    font-size:34px;font-weight:600;letter-spacing:-0.03em;line-height:1;
    color:var(--forest-900);
  }
  .signin-title .light{font-weight:200;color:var(--terra-500);font-style:italic;}
  .signin-sub{font-size:14px;color:var(--ink-500);margin-top:8px;}

  .signin-fields{margin-top:24px;display:flex;flex-direction:column;gap:12px;}
  .field{position:relative;}
  .field input{
    width:100%;background:var(--sage-100);
    border:1.5px solid transparent;
    border-radius:var(--r-pill);
    padding:16px 18px 16px 48px;
    font-family:inherit;font-size:14px;color:var(--ink-900);
    transition:all .15s;
  }
  .field input::placeholder{color:var(--sage-700);opacity:0.7;}
  .field input:focus{outline:none;border-color:var(--forest-700);background:var(--sand-50);}
  .field-icon{
    position:absolute;left:18px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;color:var(--forest-700);pointer-events:none;
  }
  .field-eye{
    position:absolute;right:18px;top:50%;transform:translateY(-50%);
    width:20px;height:20px;color:var(--forest-700);
    background:none;border:none;cursor:pointer;display:grid;place-items:center;
  }

  .signin-row{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:14px;font-size:13px;
  }
  .check{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--ink-500);}
  .check input{display:none;}
  .check-box{
    width:16px;height:16px;border-radius:50%;
    background:var(--sage-300);
    display:grid;place-items:center;flex-shrink:0;
  }
  .check input:checked + .check-box::after{
    content:"";width:7px;height:4px;
    border-left:1.5px solid var(--sand-50);border-bottom:1.5px solid var(--sand-50);
    transform:rotate(-45deg) translate(0.5px,-1px);
  }
  .forgot{color:var(--terra-500);font-weight:600;text-decoration:none;}
  .forgot:hover{color:var(--terra-700);}

  .signin-submit{
    margin-top:auto;
    width:100%;background:var(--forest-700);color:var(--sand-50);
    border:none;border-radius:var(--r-pill);
    padding:18px;font-family:inherit;font-size:15px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    position:relative;overflow:hidden;
    transition:background .15s;
  }
  .signin-submit::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:0;
    background:var(--terra-500);transition:width .25s ease;z-index:0;
  }
  .signin-submit:hover::before{width:100%;}
  .signin-submit > *{position:relative;z-index:1;}

  .signin-divider{
    margin:20px 0 14px;
    display:flex;align-items:center;gap:12px;
  }
  .signin-divider::before,.signin-divider::after{
    content:"";flex:1;height:1px;background:var(--sand-300);
  }
  .signin-divider span{
    font-family:ui-monospace,monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--ink-400);
  }
  .signin-google{
    width:100%;background:var(--sand-50);
    border:1.5px solid var(--sand-300);
    border-radius:var(--r-pill);
    padding:14px;font-family:inherit;font-size:14px;font-weight:500;
    color:var(--ink-700);
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:border-color .15s, background .15s;
  }
  .signin-google:hover{border-color:var(--forest-900);}

  .signin-foot{
    text-align:center;margin-top:14px;
    font-size:13px;color:var(--ink-500);
  }
  .signin-foot a{color:var(--forest-900);font-weight:600;text-decoration:none;border-bottom:1px solid var(--forest-900);padding-bottom:1px;}
  .signin-foot a:hover{color:var(--terra-500);border-color:var(--terra-500);}
</style>
</head>
<body>
  <main class="stage" data-screen-label="Login Mobile">

    <!-- ─────────── PHONE 1 — WELCOME ─────────── -->
    <div class="frame-wrap">
      <div class="iphone" data-screen-label="01 Welcome">
        <div class="iphone-notch"></div>
        <div class="iphone-screen">
          <section class="welcome">
            <div class="welcome-bg"></div>
            <div class="welcome-scrim"></div>

            <div class="status-bar light">
              <span>9:41</span>
              <span class="icons">
                <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 8h2v2H1V8zm4-2h2v4H5V6zm4-2h2v6H9V4zm4-2h2v8h-2V2z"/></svg>
                <svg width="15" height="11" viewBox="0 0 15 11" fill="none" stroke="currentColor" stroke-width="1"><path d="M2 4.5C3.4 3.2 5.4 2.5 7.5 2.5s4.1.7 5.5 2"/><path d="M4 6.5c1-.9 2.2-1.4 3.5-1.4s2.5.5 3.5 1.4"/><circle cx="7.5" cy="8.5" r="1" fill="currentColor"/></svg>
                <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.5" y="0.5" width="18" height="10" rx="2" stroke="currentColor"/><rect x="2" y="2" width="14" height="7" rx="1" fill="currentColor"/><rect x="19.5" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
              </span>
            </div>

            <div class="welcome-top">
              <div class="brand-mark">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                  <path d="M5 19V5h7.2c2.3 0 4 1.7 4 4 0 1.7-.9 3.1-2.3 3.7L18 19h-3.4l-3.5-5.7H8V19H5z" fill="#FAF4E8"/>
                </svg>
              </div>
              <div class="brand-name">RAYO</div>
            </div>

            <div class="welcome-mid"></div>

            <div class="welcome-bot">
              <div class="welcome-eyebrow">Comece sua trilha</div>
              <h1 class="welcome-title">
                Onde<br/>
                <span class="light">conhecimento</span><br/>
                <span class="ochre">vira</span> hábito.
              </h1>
              <p class="welcome-sub">Trilhas, comunidade e missões para você crescer no seu ritmo.</p>
              <button class="welcome-cta">
                Entrar
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m-3-3l3 3-3 3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <a href="#" class="welcome-link">Não tem conta? <strong>Criar agora</strong></a>
            </div>

            <div class="home-indicator light"></div>
          </section>
        </div>
      </div>
      <div class="frame-cap">01 · Welcome</div>
    </div>

    <!-- ─────────── PHONE 2 — SIGN IN ─────────── -->
    <div class="frame-wrap">
      <div class="iphone" data-screen-label="02 Sign in">
        <div class="iphone-notch"></div>
        <div class="iphone-screen">
          <section class="signin">
            <div class="signin-photo"></div>

            <!-- White wave joining photo to form -->
            <svg class="signin-wave" viewBox="0 0 390 80" preserveAspectRatio="none">
              <path d="M0,80 L0,30 Q 100,0 195,40 T 390,30 L390,80 Z" fill="#FAF4E8"/>
            </svg>

            <button class="signin-back" aria-label="Voltar">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4l-4 4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <div class="status-bar light">
              <span>9:41</span>
              <span class="icons">
                <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 8h2v2H1V8zm4-2h2v4H5V6zm4-2h2v6H9V4zm4-2h2v8h-2V2z"/></svg>
                <svg width="15" height="11" viewBox="0 0 15 11" fill="none" stroke="currentColor" stroke-width="1"><path d="M2 4.5C3.4 3.2 5.4 2.5 7.5 2.5s4.1.7 5.5 2"/><path d="M4 6.5c1-.9 2.2-1.4 3.5-1.4s2.5.5 3.5 1.4"/><circle cx="7.5" cy="8.5" r="1" fill="currentColor"/></svg>
                <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.5" y="0.5" width="18" height="10" rx="2" stroke="currentColor"/><rect x="2" y="2" width="14" height="7" rx="1" fill="currentColor"/><rect x="19.5" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
              </span>
            </div>

            <form class="signin-form" onsubmit="event.preventDefault();">
              <div class="signin-head">
                <div>
                  <h2 class="signin-title">Que bom <span class="light">te ver.</span></h2>
                  <p class="signin-sub">Entre na sua conta para continuar.</p>
                </div>
                <!-- decorative sprig — sun-ray accent reimagined as a small graphic -->
                <svg class="sprig" viewBox="0 0 54 54" fill="none">
                  <circle cx="27" cy="27" r="8" fill="#C8553D"/>
                  <g stroke="#C8553D" stroke-width="2" stroke-linecap="round">
                    <line x1="27" y1="6" x2="27" y2="12"/>
                    <line x1="27" y1="42" x2="27" y2="48"/>
                    <line x1="6" y1="27" x2="12" y2="27"/>
                    <line x1="42" y1="27" x2="48" y2="27"/>
                  </g>
                  <g stroke="#E8C77E" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
                    <line x1="11" y1="11" x2="15" y2="15"/>
                    <line x1="39" y1="39" x2="43" y2="43"/>
                    <line x1="11" y1="43" x2="15" y2="39"/>
                    <line x1="39" y1="15" x2="43" y2="11"/>
                  </g>
                </svg>
              </div>

              <div class="signin-fields">
                <div class="field">
                  <svg class="field-icon" viewBox="0 0 18 18" fill="none">
                    <path d="M2 5l7 5 7-5M2 4h14v10H2V4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                  </svg>
                  <input type="email" placeholder="seu@email.com" autocomplete="email" />
                </div>

                <div class="field">
                  <svg class="field-icon" viewBox="0 0 18 18" fill="none">
                    <rect x="3" y="8" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M5.5 8V5.5a3.5 3.5 0 117 0V8" stroke="currentColor" stroke-width="1.4"/>
                  </svg>
                  <input type="password" placeholder="••••••••" autocomplete="current-password" id="pwd" />
                  <button type="button" class="field-eye" aria-label="Mostrar senha" onclick="
                    var i=document.getElementById('pwd');
                    i.type = i.type==='password' ? 'text' : 'password';
                  ">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                      <path d="M1 9s2.5-5 8-5 8 5 8 5-2.5 5-8 5-8-5-8-5z" stroke="currentColor" stroke-width="1.4"/>
                      <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="signin-row">
                <label class="check">
                  <input type="checkbox" checked />
                  <span class="check-box"></span>
                  Manter conectado
                </label>
                <a href="#" class="forgot">Esqueci a senha</a>
              </div>

              <button class="signin-submit" type="submit" style="margin-top:28px;">
                <span>Entrar</span>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m-3-3l3 3-3 3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>

              <div class="signin-divider"><span>ou continue com</span></div>

              <button type="button" class="signin-google">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M17.5 9.2c0-.6-.05-1.2-.15-1.7H9v3.3h4.8c-.2 1.1-.85 2-1.8 2.65v2.2h2.9c1.7-1.55 2.6-3.85 2.6-6.45z" fill="#4285F4"/>
                  <path d="M9 18c2.4 0 4.45-.8 5.9-2.15l-2.9-2.2c-.8.55-1.85.85-3 .85-2.3 0-4.25-1.55-4.95-3.65H1.05v2.3C2.5 16.05 5.55 18 9 18z" fill="#34A853"/>
                  <path d="M4.05 10.85c-.2-.55-.3-1.15-.3-1.85s.1-1.3.3-1.85V4.85H1.05C.4 6.15 0 7.55 0 9s.4 2.85 1.05 4.15l3-2.3z" fill="#FBBC04"/>
                  <path d="M9 3.6c1.3 0 2.45.45 3.4 1.3l2.55-2.55C13.45.9 11.4 0 9 0 5.55 0 2.5 1.95 1.05 4.85l3 2.3C4.75 5.05 6.7 3.6 9 3.6z" fill="#EA4335"/>
                </svg>
                Entrar com Google
              </button>

              <div class="signin-foot">Não tem conta? <a href="#">Criar agora</a></div>
            </form>

            <div class="home-indicator"></div>
          </section>
        </div>
      </div>

    </div>

  </main>
